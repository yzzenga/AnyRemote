<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="192" height="192" rx="36" fill="url(#bg1)"/>
  
  <!-- 红外发射光线 (顶部) -->
  <ellipse cx="96" cy="28" rx="6" ry="2" fill="#FFD54F" opacity="0.4"/>
  <ellipse cx="96" cy="28" rx="14" ry="4" fill="#FFD54F" opacity="0.25"/>
  <ellipse cx="96" cy="28" rx="24" ry="6" fill="#FFD54F" opacity="0.12"/>
  
  <!-- 遥控器主体 -->
  <rect x="60" y="34" width="72" height="130" rx="12" fill="white"/>
  <rect x="60" y="34" width="72" height="130" rx="12" fill="none" stroke="#E0E0E0" stroke-width="0.5"/>
  
  <!-- 红外发射头 -->
  <rect x="80" y="36" width="32" height="6" rx="3" fill="#B71C1C"/>
  <ellipse cx="96" cy="36" rx="16" ry="3" fill="#EF5350" opacity="0.6"/>
  
  <!-- 屏幕 -->
  <rect x="72" y="48" width="48" height="18" rx="3" fill="#0D47A1"/>
  <text x="96" y="61" font-family="sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">遥控</text>
  
  <!-- 电源按钮 -->
  <circle cx="96" cy="84" r="9" fill="#E53935"/>
  <text x="96" y="87" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle">⏻</text>
  
  <!-- 方向键区域 -->
  <circle cx="96" cy="115" r="16" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="96" y1="101" x2="96" y2="129" stroke="#BDBDBD" stroke-width="1.5"/>
  <line x1="82" y1="115" x2="110" y2="115" stroke="#BDBDBD" stroke-width="1.5"/>
  <circle cx="96" cy="115" r="4" fill="#1565C0"/>
  
  <!-- 底部按钮行 -->
  <circle cx="82" cy="146" r="5" fill="#E0E0E0"/>
  <circle cx="96" cy="146" r="5" fill="#E0E0E0"/>
  <circle cx="110" cy="146" r="5" fill="#E0E0E0"/>
  
  <!-- 发射红外信号波纹 (顶部动态线条) -->
  <path d="M96 18 Q96 10 96 6" stroke="#FFD54F" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M86 20 Q82 12 80 6" stroke="#FFD54F" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M106 20 Q110 12 112 6" stroke="#FFD54F" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
