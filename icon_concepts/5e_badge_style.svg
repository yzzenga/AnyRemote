<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="g5e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="36" fill="url(#g5e)"/>
  
  <!-- 圆角方形徽章背景 (比遥控器大一圈) -->
  <rect x="36" y="12" width="120" height="168" rx="20" fill="white" opacity="0.08"/>
  
  <!-- 遥控器 -->
  <rect x="52" y="22" width="88" height="148" rx="16" fill="white"/>
  
  <!-- 顶部的IR发射区域 (更突出) -->
  <rect x="72" y="24" width="48" height="8" rx="4" fill="none" stroke="#E53935" stroke-width="2"/>
  <rect x="84" y="24" width="24" height="8" rx="4" fill="#E53935"/>
  
  <!-- 红外信号波纹 (向上发射) -->
  <ellipse cx="96" cy="18" rx="4" ry="1.5" fill="#FFD54F" opacity="0.5"/>
  <ellipse cx="96" cy="14" rx="8" ry="2" fill="#FFD54F" opacity="0.25"/>
  <ellipse cx="96" cy="10" rx="14" ry="3" fill="#FFD54F" opacity="0.1"/>
  
  <!-- 屏幕 -->
  <rect x="64" y="38" width="64" height="22" rx="4" fill="#1A237E"/>
  <text x="96" y="53" font-family="sans-serif" font-size="11" fill="#64FFDA" text-anchor="middle" font-weight="bold">万能控</text>
  
  <!-- 电源(用描边圆圈+竖线更精致) -->
  <circle cx="96" cy="78" r="13" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <line x1="96" y1="67" x2="96" y2="80" stroke="#E53935" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 方向键 (使用菱形排列更简洁) -->
  <g transform="translate(96,115)">
    <rect x="-5" y="-16" width="10" height="10" rx="2" fill="#E8EAF6"/>
    <rect x="-5" y="6" width="10" height="10" rx="2" fill="#E8EAF6"/>
    <rect x="-16" y="-5" width="10" height="10" rx="2" fill="#E8EAF6"/>
    <rect x="6" y="-5" width="10" height="10" rx="2" fill="#E8EAF6"/>
    <rect x="-5" y="-5" width="10" height="10" rx="2" fill="#1A237E"/>
  </g>
  
  <!-- TV / AC 标签 (在底部并列) -->
  <rect x="68" y="150" width="22" height="12" rx="4" fill="#E8EAF6"/>
  <text x="79" y="159" font-family="sans-serif" font-size="7" fill="#1A237E" text-anchor="middle" font-weight="bold">TV</text>
  <rect x="102" y="150" width="22" height="12" rx="4" fill="#E8EAF6"/>
  <text x="113" y="159" font-family="sans-serif" font-size="7" fill="#1A237E" text-anchor="middle" font-weight="bold">AC</text>
  
  <!-- 底边信号 -->
  <ellipse cx="96" cy="174" rx="3" ry="1" fill="#64FFDA" opacity="0.5"/>
  <ellipse cx="96" cy="174" rx="8" ry="2" fill="#64FFDA" opacity="0.2"/>
</svg>
