<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- 深色圆角背景 -->
  <rect width="192" height="192" rx="36" fill="#121212"/>
  
  <!-- 遥控器主体 -->
  <rect x="52" y="20" width="88" height="152" rx="16" fill="#1E1E1E" stroke="#333" stroke-width="1"/>
  
  <!-- 顶部红外发射区 -->
  <rect x="76" y="22" width="40" height="6" rx="3" fill="#CF6679"/>
  <ellipse cx="96" cy="24" rx="20" ry="4" fill="#CF6679" opacity="0.3"/>
  
  <!-- 状态屏 -->
  <rect x="64" y="36" width="64" height="22" rx="4" fill="#000"/>
  <text x="96" y="51" font-family="sans-serif" font-size="11" fill="#BB86FC" text-anchor="middle" font-weight="bold">遥控</text>
  
  <!-- 电源按钮 -->
  <rect x="76" y="68" width="40" height="24" rx="6" fill="#CF6679"/>
  <text x="96" y="84" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle">⏻</text>
  
  <!-- 方向圆盘 -->
  <circle cx="96" cy="117" r="28" fill="#2C2C2C" stroke="#333" stroke-width="0.5"/>
  <line x1="96" y1="92" x2="96" y2="142" stroke="#444" stroke-width="1.5"/>
  <line x1="70" y1="117" x2="122" y2="117" stroke="#444" stroke-width="1.5"/>
  <circle cx="96" cy="117" r="8" fill="#BB86FC"/>
  
  <!-- TV / AC -->
  <rect x="70" y="156" width="18" height="10" rx="3" fill="#2C2C2C"/>
  <text x="79" y="164" font-family="sans-serif" font-size="6" fill="#BB86FC" text-anchor="middle">TV</text>
  <rect x="104" y="156" width="18" height="10" rx="3" fill="#2C2C2C"/>
  <text x="113" y="164" font-family="sans-serif" font-size="6" fill="#BB86FC" text-anchor="middle">AC</text>
  
  <!-- 信号 -->
  <ellipse cx="96" cy="176" rx="3" ry="1" fill="#BB86FC" opacity="0.5"/>
  <ellipse cx="96" cy="176" rx="8" ry="2" fill="#BB86FC" opacity="0.2"/>
  <ellipse cx="96" cy="176" rx="16" ry="4" fill="#BB86FC" opacity="0.08"/>
</svg>
