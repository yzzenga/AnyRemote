<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="g5c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="50%" stop-color="#203A43"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="remote_grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#ECEFF1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="192" height="192" rx="36" fill="url(#g5c)"/>
  
  <!-- 遥控器主体 (微渐变) -->
  <rect x="52" y="20" width="88" height="152" rx="16" fill="url(#remote_grad)"/>
  
  <!-- 顶部红外发光 -->
  <rect x="76" y="22" width="40" height="6" rx="3" fill="#FF5252"/>
  <ellipse cx="96" cy="24" rx="20" ry="4" fill="#FF5252" opacity="0.4"/>
  <ellipse cx="96" cy="20" rx="8" ry="2" fill="#FFD54F" opacity="0.5" filter="url(#glow)"/>
  
  <!-- 状态屏 -->
  <rect x="64" y="36" width="64" height="22" rx="4" fill="#0F2027"/>
  <text x="96" y="51" font-family="sans-serif" font-size="11" fill="#4FC3F7" text-anchor="middle" font-weight="bold">遥控</text>
  
  <!-- 电源按钮 -->
  <rect x="76" y="68" width="40" height="24" rx="6" fill="#FF5252"/>
  <text x="96" y="84" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle">⏻</text>
  
  <!-- 方向圆盘 -->
  <circle cx="96" cy="117" r="28" fill="#F5F5F5" stroke="#CFD8DC" stroke-width="0.5"/>
  <line x1="96" y1="92" x2="96" y2="142" stroke="#B0BEC5" stroke-width="1.5"/>
  <line x1="70" y1="117" x2="122" y2="117" stroke="#B0BEC5" stroke-width="1.5"/>
  <circle cx="96" cy="117" r="8" fill="#0288D1"/>
  
  <!-- TV / AC -->
  <rect x="70" y="156" width="18" height="10" rx="3" fill="#E1F5FE"/>
  <text x="79" y="164" font-family="sans-serif" font-size="6" fill="#0288D1" text-anchor="middle" font-weight="bold">TV</text>
  <rect x="104" y="156" width="18" height="10" rx="3" fill="#E1F5FE"/>
  <text x="113" y="164" font-family="sans-serif" font-size="6" fill="#0288D1" text-anchor="middle" font-weight="bold">AC</text>
  
  <!-- 底部信号 -->
  <ellipse cx="96" cy="176" rx="3" ry="1" fill="#4FC3F7" opacity="0.6"/>
  <ellipse cx="96" cy="176" rx="8" ry="2" fill="#4FC3F7" opacity="0.25"/>
  <ellipse cx="96" cy="176" rx="16" ry="4" fill="#4FC3F7" opacity="0.1"/>
</svg>
