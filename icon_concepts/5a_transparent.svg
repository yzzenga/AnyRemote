<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- 纯透明背景，只有遥控器 -->
  <!-- 遥控器主体 (带阴影) -->
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect x="52" y="20" width="88" height="152" rx="16" fill="white" filter="url(#shadow)"/>
  
  <!-- 顶部红外发射区 -->
  <rect x="76" y="22" width="40" height="6" rx="3" fill="#E53935"/>
  <ellipse cx="96" cy="24" rx="20" ry="4" fill="#EF5350" opacity="0.35"/>
  
  <!-- 状态屏 -->
  <rect x="64" y="36" width="64" height="22" rx="4" fill="#1A237E"/>
  <text x="96" y="51" font-family="sans-serif" font-size="11" fill="#64FFDA" text-anchor="middle" font-weight="bold">遥控</text>
  
  <!-- 电源按钮 -->
  <rect x="76" y="68" width="40" height="24" rx="6" fill="#E53935"/>
  <text x="96" y="84" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle">⏻</text>
  
  <!-- 方向圆盘 -->
  <circle cx="96" cy="117" r="28" fill="#F5F5F7" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="96" y1="92" x2="96" y2="142" stroke="#BDBDBD" stroke-width="1.5"/>
  <line x1="70" y1="117" x2="122" y2="117" stroke="#BDBDBD" stroke-width="1.5"/>
  <circle cx="96" cy="117" r="8" fill="#1A237E"/>
  
  <!-- TV / AC 标签 -->
  <rect x="70" y="156" width="18" height="10" rx="3" fill="#E8EAF6"/>
  <text x="79" y="164" font-family="sans-serif" font-size="6" fill="#1A237E" text-anchor="middle">TV</text>
  <rect x="104" y="156" width="18" height="10" rx="3" fill="#E8EAF6"/>
  <text x="113" y="164" font-family="sans-serif" font-size="6" fill="#1A237E" text-anchor="middle">AC</text>
  
  <!-- 信号波纹 -->
  <ellipse cx="96" cy="176" rx="3" ry="1" fill="#1A237E" opacity="0.5"/>
  <ellipse cx="96" cy="176" rx="8" ry="2" fill="#1A237E" opacity="0.2"/>
  <ellipse cx="96" cy="176" rx="16" ry="4" fill="#1A237E" opacity="0.08"/>
</svg>
